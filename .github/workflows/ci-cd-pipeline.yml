name: Enterprise CI/CD Pipeline
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
  packages: write
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  # -------------------------------------------------------------
  # STAGE 1: QUALITY ASSURANCE
  # -------------------------------------------------------------
  quality-assurance:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hasher-website
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './hasher-website/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Run Unit Tests
        run: npm run test
  # -------------------------------------------------------------
  # STAGE 2: DEPLOY TO GITHUB PAGES
  # -------------------------------------------------------------
  deploy-pages:
    name: Deploy Static Website
    needs: quality-assurance
    # Only run on push to main branch (skip deploying on PRs)
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hasher-website
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './hasher-website/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Build Production Bundle
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './hasher-website/dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
